  # ============================================================
  # Vendas
  # ============================================================
  /api/v1/vendas:
    get:
      tags:
        - Vendas
      summary: Lista vendas com totais calculados
      description: |
        Retorna vendas a partir da view `vw_vendas_resumo` com totais já calculados.
        Suporta múltiplos filtros opcionais.
      operationId: listVendas
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VendaStatus"
          description: Filtra por status exato
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
          description: "Data inicial da venda (formato: YYYY-MM-DD)"
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
          description: "Data final da venda (formato: YYYY-MM-DD)"
        - name: cliente_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtra por cliente
        - name: pendente
          in: query
          schema:
            type: boolean
          description: "Se `true`, retorna apenas vendas com saldo a receber"
      responses:
        "200":
          description: Lista de vendas ordenada por data_venda DESC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendaListResponse"
        "400":
          description: Parâmetro inválido (ex: cliente_id não é UUID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Vendas
      summary: Cria uma nova venda (com itens opcionais)
      operationId: createVenda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendaCreateRequest"
      responses:
        "201":
          description: Venda criada com sucesso (retorna detalhe completo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendaDetailResponse"
        "400":
          description: |
            Dados inválidos. Possíveis erros:
            - `cliente_id` obrigatório ou não encontrado
            - `status` inválido
            - `data_entrega_prevista` obrigatória para A_ENTREGAR_DATA
            - `data_venda` obrigatória (formato YYYY-MM-DD)
            - Valores monetários negativos
            - Erros de validação dos itens (produto_nome, quantidade, preços)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vendas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID da venda
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Vendas
      summary: Busca uma venda por ID com itens e pagamentos
      operationId: getVenda
      responses:
        "200":
          description: Detalhe completo da venda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendaDetailResponse"
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Venda não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Vendas
      summary: Atualiza uma venda
      description: |
        Atualiza campos editáveis da venda.
        **Campos imutáveis**: `cliente_id` e `data_venda`.
      operationId: updateVenda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendaUpdateRequest"
      responses:
        "200":
          description: Venda atualizada (retorna detalhe completo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendaDetailResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Venda não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Vendas
      summary: Remove uma venda (soft delete)
      operationId: deleteVenda
      responses:
        "204":
          description: Venda removida com sucesso
        "400":
          description: UUID inválido
          content:
