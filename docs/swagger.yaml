  # ============================================================
  # Pagamentos
  # ============================================================
  /api/v1/vendas/{id}/pagamentos:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID da venda
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Pagamentos
      summary: Lista pagamentos de uma venda
      description: "Retorna pagamentos ordenados: pendentes primeiro, depois por data."
      operationId: listPagamentos
      responses:
        "200":
          description: Lista de pagamentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PagamentoResponse"
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Venda não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Pagamentos
      summary: Registra um pagamento para uma venda
      description: |
        Lógica de status automático:
        - `data_agendada` fornecida → `status = pendente`
        - `data_pagamento` fornecida → `status = recebido`
        - Nenhuma data fornecida → `status = recebido`, `data_pagamento = hoje`
        
        **Regra:** `data_pagamento` e `data_agendada` são mutuamente exclusivos.
      operationId: createPagamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagamentoCreateRequest"
      responses:
        "201":
          description: Pagamento registrado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagamentoResponse"
        "400":
          description: |
            Dados inválidos:
            - `valor` deve ser > 0
            - Não é permitido informar `data_pagamento` e `data_agendada` ao mesmo tempo
            - Formato de data inválido (esperado YYYY-MM-DD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Venda não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vendas/{id}/pagamentos/{pagId}:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID da venda
        schema:
          type: string
          format: uuid
      - name: pagId
        in: path
        required: true
        description: UUID do pagamento
        schema:
          type: string
          format: uuid

    put:
      tags:
        - Pagamentos
      summary: Atualiza um pagamento
      operationId: updatePagamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagamentoUpdateRequest"
      responses:
        "200":
          description: Pagamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagamentoResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Pagamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Pagamentos
      summary: Remove um pagamento
      operationId: deletePagamento
      responses:
        "204":
          description: Pagamento removido com sucesso
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Pagamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vendas/{id}/pagamentos/{pagId}/confirmar:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID da venda
        schema:
          type: string
          format: uuid
      - name: pagId
        in: path
        required: true
        description: UUID do pagamento
        schema:
          type: string
          format: uuid

    post:
      tags:
        - Pagamentos
      summary: Confirma o recebimento de um pagamento pendente
      description: |
        Altera o status do pagamento de `pendente` para `recebido`.
        Se `data_pagamento` não for fornecida no body, assume a data de hoje.
        Retorna 400 se o pagamento já estiver `recebido`.
      operationId: confirmarPagamento
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagamentoConfirmarRequest"
      responses:
        "200":
          description: Pagamento confirmado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagamentoResponse"
        "400":
          description: Pagamento já confirmado ou data inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Pagamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Estoque
  # ============================================================
  /api/v1/estoque/resumo:
    get:
      tags:
        - Estoque
      summary: Resumo do estoque agrupado por produto
      operationId: getResumoEstoque
      parameters:
        - name: produto_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtra por produto específico
      responses:
        "200":
          description: Resumo do estoque ordenado por quantidade_total DESC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumoEstoqueItem"
        "400":
          description: produto_id inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estoque:
    get:
      tags:
        - Estoque
      summary: Lista lançamentos de entrada de estoque
      operationId: listEstoque
      parameters:
        - name: produto_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtra por produto
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
          description: "Filtra por data_entrada >= (formato: YYYY-MM-DD)"
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
          description: "Filtra por data_entrada <= (formato: YYYY-MM-DD)"
      responses:
        "200":
          description: Lista de lançamentos ordenada por data_entrada DESC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EstoqueResponse"
        "400":
          description: produto_id inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Estoque
      summary: Registra uma entrada de estoque
      operationId: createEstoque
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstoqueRequest"
      responses:
        "201":
          description: Entrada de estoque registrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstoqueResponse"
        "400":
          description: |
            Dados inválidos:
            - `produto_nome` obrigatório
            - `quantidade_entrada` deve ser > 0
            - `custo_unit` não pode ser negativo
            - `data_entrada` obrigatória (formato: YYYY-MM-DD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/estoque/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID do lançamento de estoque
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Estoque
      summary: Busca um lançamento de estoque por ID
      operationId: getEstoque
      responses:
        "200":
          description: Lançamento de estoque encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstoqueResponse"
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Estoque
      summary: Atualiza um lançamento de estoque
      operationId: updateEstoque
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstoqueRequest"
      responses:
        "200":
          description: Lançamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstoqueResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Estoque
      summary: Remove um lançamento de estoque (hard delete)
      description: "⚠️ Diferente dos outros recursos, este é um **hard delete** (remoção física)."
      operationId: deleteEstoque
      responses:
        "204":
          description: Lançamento removido com sucesso
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Dashboard
  # ============================================================
  /api/v1/dashboard/resumo:
    get:
      tags:
        - Dashboard
      summary: Resumo financeiro do período
      description: |
        Retorna indicadores financeiros consolidados.
        Por padrão, o período é o mês corrente.
        `total_a_receber` e `vendas_abertas` ignoram o filtro de período (refletem o total global de não-ENTREGUE).
      operationId: getDashboardResumo
      parameters:
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
          description: "Início do período (padrão: primeiro dia do mês atual)"
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
          description: "Fim do período (padrão: hoje)"
      responses:
        "200":
          description: Resumo financeiro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumoResponse"
        "400":
          description: Data inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/dashboard/notificacoes:
    get:
      tags:
        - Dashboard
      summary: Lista notificações não lidas
      description: "Retorna até 50 notificações não lidas. Pagamentos vencidos aparecem primeiro."
      operationId: getNotificacoes
      responses:
        "200":
          description: Lista de notificações
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificacoesListResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/dashboard/notificacoes/{id}/lida:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID da notificação
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Dashboard
      summary: Marca uma notificação como lida
      operationId: marcarNotificacaoLida
      responses:
        "204":
          description: Notificação marcada como lida
        "400":
          description: UUID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "404":
          description: Notificação não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/dashboard/notificacoes/marcar-todas-lidas:
    post:
      tags:
        - Dashboard
      summary: Marca todas as notificações como lidas
      operationId: marcarTodasNotificacoesLidas
      responses:
        "204":
          description: Todas as notificações marcadas como lidas
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/dashboard/gerar-notificacoes:
    post:
      tags:
        - Dashboard
      summary: Dispara a geração de notificações de pagamentos
      description: |
        Executa a função PostgreSQL `gerar_notificacoes_pagamentos()`.
        Normalmente executada automaticamente via `pg_cron`.
      operationId: gerarNotificacoes
      responses:
        "204":
          description: Notificações geradas com sucesso
        "401":
          description: Não autenticado
        "500":
          description: Erro ao executar função
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Relatórios
  # ============================================================
  /api/v1/relatorios/vendas:
    get:
      tags:
        - Relatórios
      summary: Vendas e lucro por mês
      description: "Retorna dados agrupados por mês dos últimos N meses (padrão: 12, máx: 60)."
      operationId: getVendasPorMes
      parameters:
        - name: meses
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 12
          description: "Número de meses retrospectivos (1-60)"
      responses:
        "200":
          description: Dados de vendas por mês
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendasPorMesResponse"
        "400":
          description: Parâmetro `meses` inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/relatorios/produtos:
    get:
      tags:
        - Relatórios
      summary: Ranking dos produtos mais vendidos
      description: "Retorna os 20 produtos com maior receita no período. Sem filtro de data, considera todas as vendas."
      operationId: getProdutosMaisVendidos
      parameters:
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
          description: "Início do período (formato: YYYY-MM-DD)"
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
          description: "Fim do período (formato: YYYY-MM-DD)"
      responses:
        "200":
          description: Ranking de produtos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProdutoRankingResponse"
        "400":
          description: Data inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Health
    description: Verificação de disponibilidade da API (público)
  - name: Clientes
    description: Gerenciamento de clientes
  - name: Produtos
    description: Catálogo de produtos
  - name: Fornecedores
    description: Gerenciamento de fornecedores
  - name: Vendedores Externos
    description: Gerenciamento de vendedores externos (comissionados)
  - name: Vendas
    description: Gestão completa de vendas
  - name: Vendas / Itens
    description: Itens de uma venda
  - name: Pagamentos
    description: Pagamentos de clientes por venda
  - name: Estoque
    description: Controle de entradas de estoque
  - name: Dashboard
    description: Indicadores financeiros e notificações
  - name: Relatórios
    description: Relatórios analíticos de vendas e produtos
